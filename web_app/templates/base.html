<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}鸣潮DPS计算器{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-brand">
            <span class="logo">◆</span>
            <span class="brand-text">鸣潮DPS计算器</span>
            <span class="version">v3.0</span>
        </div>
        <div class="nav-links">
            <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">首页</a>
            <a href="/calculator" class="nav-link {% if request.path == '/calculator' %}active{% endif %}">📊 排轴计算器</a>
            <a href="/characters" class="nav-link {% if request.path == '/characters' %}active{% endif %}">角色列表</a>
            <a href="/wiki" class="nav-link {% if request.path == '/wiki' %}active{% endif %}">常识手册</a>
        </div>
        <div class="nav-actions">
            <button class="btn btn-primary" onclick="importData()">导入数据</button>
        </div>
    </nav>

    <!-- 主内容区 -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <!-- 遮罩层 -->
    <div id="overlay" class="overlay" onclick="closeAllPanels()"></div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
