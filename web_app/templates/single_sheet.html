<!DOCTYPE html>

        .app-container { display: flex; flex-direction: column; height: 100vh; }
        
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #0f3460;
            flex-shrink: 0;
        }
        .header h1 { font-size: 18px; font-weight: 600; color: #00d4ff; }
        .header-actions { display: flex; gap: 10px; }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s;
        }
        .btn-primary { background: linear-gradient(135deg, #00d4ff, #0099cc); color: #000; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0,212,255,0.4); }
        .btn-secondary { background: #2a2a3e; color: #e0e0e0; border: 1px solid #3a3a4e; }
        .btn-secondary:hover { background: #3a3a4e; }
        
        .main-content { flex: 1; overflow: hidden; }
        #luckysheet-container { width: 100%; height: 100%; }
        
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .loading-content {
            text-align: center;
            color: #fff;
        }
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        #fileInput { display: none; }
    </style>
</head>
<body>

            <div class="header-actions">
                <button class="btn btn-secondary" onclick="importExcel()">📥 导入Excel</button>

                <button class="btn btn-secondary" onclick="saveData()">💾 保存</button>
                <button class="btn btn-secondary" onclick="loadData()">📂 加载</button>
                <button class="btn btn-primary" onclick="calculateAll()">🔄 重新计算</button>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="main-content">
            <div id="luckysheet-container"></div>
        </div>
    </div>
    
    <input type="file" id="fileInput" accept=".xlsx,.xls" onchange="handleFile(event)">
    
    <div class="loading-overlay" id="loading">

        // 初始化Luckysheet
        function initLuckysheet() {
            const sheetData = createSingleSheetData();
            
            luckysheet.create({
                container: 'luckysheet-container',
                title: '鸣潮DPS计算器 - 单一大表',
                lang: 'zh',
                showinfobar: true,
                showsheetbar: false,
                showstatisticBar: true,
                enableAddRow: true,
                enableAddCol: true,
                data: [sheetData],
                forceCalculation: true
            });
        }
        
        // 导入Excel
        function importExcel() {
            document.getElementById('fileInput').click();
        }
        
        function handleFile(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            showLoading();
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    
                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                    const jsonData = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });
                    
                    const celldata = [];
                    jsonData.forEach((row, r) => {
                        row.forEach((cell, c) => {
                            if (cell !== undefined && cell !== null) {
                                celldata.push({
                                    r: r,
                                    c: c,
                                    v: { ct: { fa: 'General', t: 'n' }, v: String(cell), m: String(cell) }
                                });
                            }
                        });
                    });
                    
                    luckysheet.destroy();
                    luckysheet.create({
                        container: 'luckysheet-container',
                        title: file.name,
                        lang: 'zh',
                        showinfobar: true,
                        showsheetbar: false,
                        showstatisticBar: true,
                        enableAddRow: true,
                        enableAddCol: true,
                        data: [{
                            name: workbook.SheetNames[0],
                            color: '#00d4ff',
                            status: 1,
                            order: 0,
                            celldata: celldata,
                            row: jsonData.length + 50,
                            column: 30,
                            defaultRowHeight: 25,
                            defaultColWidth: 90,
                            config: {
                                merge: {},
                                rowlen: {},
                                columnlen: {},
                                rowhidden: {},
                                colhidden: {}
                            }
                        }],
                        forceCalculation: true
                    });
                    
                    hideLoading();
                    alert('导入成功！');
                } catch (error) {
                    hideLoading();
                    alert('导入失败: ' + error.message);
                }
            };
            reader.readAsArrayBuffer(file);
        }
        
        // 导出Excel
        function exportExcel() {
            try {
                const sheetData = luckysheet.getSheetData();
                const wsData = [];
                
                for (let r = 0; r < sheetData[0].row; r++) {
                    const row = [];
                    for (let c = 0; c < sheetData[0].column; c++) {
                        const cell = sheetData[0].celldata.find(cd => cd.r === r && cd.c === c);
                        row.push(cell ? cell.v.v : '');
                    }
                    wsData.push(row);
                }
                
                const ws = XLSX.utils.aoa_to_sheet(wsData);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, '鸣潮DPS计算');
                XLSX.writeFile(wb, '鸣潮DPS计算_单一大表.xlsx');
            } catch (error) {
                alert('导出失败: ' + error.message);
            }
        }
        
        // 保存数据
        function saveData() {
            try {
                const sheetData = luckysheet.getSheetData();
                localStorage.setItem('wuwaSingleSheetData', JSON.stringify({
                    sheetData: sheetData,
                    timestamp: new Date().toISOString()
                }));
                alert('数据已保存到本地！');
            } catch (error) {
                alert('保存失败: ' + error.message);
            }
        }
        
        // 加载数据
        function loadData() {
            try {
                const saved = localStorage.getItem('wuwaSingleSheetData');
                if (saved) {
                    const data = JSON.parse(saved);
                    luckysheet.destroy();
                    luckysheet.create({
                        container: 'luckysheet-container',
                        title: '鸣潮DPS计算器 - 单一大表',
                        lang: 'zh',
                        showinfobar: true,
                        showsheetbar: false,
                        showstatisticBar: true,
                        enableAddRow: true,
                        enableAddCol: true,
                        data: data.sheetData,
                        forceCalculation: true
                    });
                    alert('数据加载成功！');
                } else {
                    alert('没有找到保存的数据！');
                }
            } catch (error) {
                alert('加载失败: ' + error.message);
            }
        }
        
        // 重新计算
        function calculateAll() {
            luckysheet.refresh();
            alert('计算完成！');
        }
        
        function showLoading() {
            document.getElementById('loading').style.display = 'flex';
        }
        
        function hideLoading() {
            document.getElementById('loading').style.display = 'none';
        }
        
        // 页面加载完成后初始化
        window.onload = function() {
            setTimeout(() => {
                initLuckysheet();
            }, 100);
        };
    </script>
</body>
</html>
