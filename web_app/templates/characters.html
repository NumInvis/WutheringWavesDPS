{% extends "base.html" %}

{% block title %}角色列表 - 鸣潮DPS计算器{% endblock %}

{% block extra_css %}
<style>
.characters-container {
    max-width: 1920px;
    margin: 0 auto;
    padding: 20px;
}

/* 页面头部 */
.page-header {
    background: var(--bg-secondary);
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
    padding: 20px 24px;
    margin-bottom: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.page-header h1 {
    font-size: 24px;
    display: flex;
    align-items: center;
    gap: 12px;
}

.search-box {
    display: flex;
    gap: 12px;
    align-items: center;
}

.search-box input {
    padding: 10px 16px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-primary);
    font-size: 14px;
    width: 280px;
}

.search-box input:focus {
    outline: none;
    border-color: var(--accent);
}

/* 角色网格 */
.characters-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
}

.character-card {
    background: var(--bg-secondary);
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
    padding: 16px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
}

.character-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
}

.character-card.selected {
    border-color: var(--accent);
    background: rgba(59, 130, 246, 0.1);
}

.character-icon {
    font-size: 48px;
    margin-bottom: 12px;
}

.character-name {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 4px;
}

.character-count {
    font-size: 12px;
    color: var(--text-secondary);
}

/* 技能详情面板 */
.skills-panel {
    background: var(--bg-secondary);
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
    overflow: hidden;
}

.skills-panel-header {
    background: var(--bg-card);
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.skills-panel-header h2 {
    font-size: 18px;
    display: flex;
    align-items: center;
    gap: 10px;
}

.skills-table-container {
    overflow-x: auto;
}

.skills-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    min-width: 1400px;
}

.skills-table th {
    background: var(--bg-card);
    color: var(--text-primary);
    font-weight: 600;
    padding: 12px 10px;
    border: 1px solid var(--border);
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 10;
}

.skills-table td {
    padding: 10px;
    border: 1px solid var(--border);
    text-align: center;
}

.skills-table tr:nth-child(even) {
    background: rgba(255, 255, 255, 0.02);
}

.skills-table tr:hover {
    background: rgba(59, 130, 246, 0.1);
}

/* 列宽定义 */
.col-skill-code { width: 80px; }
.col-element { width: 60px; }
.col-settlement { width: 80px; }
.col-skill-type { width: 80px; }
.col-damage-type { width: 80px; }
.col-damage-subtype { width: 90px; }
.col-heal { width: 80px; }
.col-multiplier-base { width: 100px; }
.col-multiplier { width: 80px; }
.col-energy { width: 70px; }
.col-res-energy1 { width: 80px; }
.col-res-energy2 { width: 80px; }

/* 标签样式 */
.tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
}

.tag-e { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
.tag-q { background: rgba(168, 85, 247, 0.2); color: #c084fc; }
.tag-a { background: rgba(34, 197, 94, 0.2); color: #4ade80; }
.tag-h { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }

/* 元素颜色 */
.element-湮灭 { color: #a855f7; }
.element-热熔 { color: #ef4444; }
.element-气动 { color: #22c55e; }
.element-导电 { color: #3b82f6; }
.element-冷凝 { color: #06b6d4; }
.element-衍射 { color: #f59e0b; }

/* 空状态 */
.empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-secondary);
}

.empty-state-icon {
    font-size: 64px;
    margin-bottom: 16px;
}

.empty-state-text {
    font-size: 16px;
}

/* 筛选标签 */
.filter-tags {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
}

.filter-tag {
    padding: 6px 12px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
}

.filter-tag:hover,
.filter-tag.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
}
</style>
{% endblock %}

{% block content %}
<div class="characters-container">
    <!-- 页面头部 -->
    <div class="page-header">
        <h1>👥 角色列表</h1>
        <div class="search-box">
            <input type="text" id="char-search" placeholder="搜索角色名称..." oninput="filterCharacters()">
        </div>
    </div>

    <!-- 筛选标签 -->
    <div class="filter-tags">
        <div class="filter-tag active" onclick="filterByElement('all')">全部</div>
        <div class="filter-tag" onclick="filterByElement('湮灭')">湮灭</div>
        <div class="filter-tag" onclick="filterByElement('热熔')">热熔</div>
        <div class="filter-tag" onclick="filterByElement('气动')">气动</div>
        <div class="filter-tag" onclick="filterByElement('导电')">导电</div>
        <div class="filter-tag" onclick="filterByElement('冷凝')">冷凝</div>
        <div class="filter-tag" onclick="filterByElement('衍射')">衍射</div>
    </div>

    <!-- 角色网格 -->
    <div class="characters-grid" id="characters-grid">
        <div class="empty-state">
            <div class="empty-state-icon">⏳</div>
            <div class="empty-state-text">加载中...</div>
        </div>
    </div>

    <!-- 技能详情面板 -->
    <div class="skills-panel" id="skills-panel" style="display: none;">
        <div class="skills-panel-header">
            <h2 id="selected-char-name">选择角色查看技能</h2>
            <span id="skill-count" style="color: var(--text-secondary);">0 个动作</span>
        </div>
        <div class="skills-table-container">
            <table class="skills-table">
                <thead>
                    <tr>
                        <th class="col-skill-code">动作代码</th>
                        <th class="col-element">属性</th>
                        <th class="col-settlement">结算类型</th>
                        <th class="col-skill-type">技能类型</th>
                        <th class="col-damage-type">伤害类型</th>
                        <th class="col-damage-subtype">伤害子类</th>
                        <th class="col-heal">基础治疗</th>
                        <th class="col-multiplier-base">倍率关联</th>
                        <th class="col-multiplier">倍率</th>
                        <th class="col-energy">大招能量</th>
                        <th class="col-res-energy1">协奏能量1</th>
                        <th class="col-res-energy2">协奏能量2</th>
                    </tr>
                </thead>
                <tbody id="skills-tbody">
                    <!-- 动态生成 -->
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let allCharacters = [];
let currentFilter = 'all';
let selectedChar = null;

document.addEventListener('DOMContentLoaded', function() {
    loadCharacters();
});

async function loadCharacters() {
    try {
        const res = await fetch('/api/characters');
        const data = await res.json();
        
        if (data.success) {
            allCharacters = data.data;
            renderCharacters();
        }
    } catch (e) {
        console.error('加载角色失败:', e);
        document.getElementById('characters-grid').innerHTML = `
            <div class="empty-state">
                <div class="empty-state-icon">❌</div>
                <div class="empty-state-text">加载失败，请刷新重试</div>
            </div>
        `;
    }
}

function renderCharacters() {
    const grid = document.getElementById('characters-grid');
    const searchTerm = document.getElementById('char-search').value.toLowerCase();
    
    let filtered = allCharacters;
    
    // 按属性筛选
    if (currentFilter !== 'all') {
        // 这里需要根据实际数据结构调整
        // 暂时显示所有
    }
    
    // 按搜索词筛选
    if (searchTerm) {
        filtered = filtered.filter(c => c.name.toLowerCase().includes(searchTerm));
    }
    
    if (filtered.length === 0) {
        grid.innerHTML = `
            <div class="empty-state" style="grid-column: 1 / -1;">
                <div class="empty-state-icon">🔍</div>
                <div class="empty-state-text">没有找到匹配的角色</div>
            </div>
        `;
        return;
    }
    
    grid.innerHTML = filtered.map(char => `
        <div class="character-card ${selectedChar === char.name ? 'selected' : ''}" 
             onclick="selectCharacter('${char.name}')">
            <div class="character-icon">👤</div>
            <div class="character-name">${char.name}</div>
            <div class="character-count">${char.skills ? char.skills.length : 0} 个动作</div>
        </div>
    `).join('');
}

function filterCharacters() {
    renderCharacters();
}

function filterByElement(element) {
    currentFilter = element;
    
    // 更新标签样式
    document.querySelectorAll('.filter-tag').forEach(tag => {
        tag.classList.remove('active');
        if (tag.textContent === (element === 'all' ? '全部' : element)) {
            tag.classList.add('active');
        }
    });
    
    renderCharacters();
}

async function selectCharacter(name) {
    selectedChar = name;
    renderCharacters();
    
    try {
        const res = await fetch(`/api/character/${name}`);
        const data = await res.json();
        
        if (data.success) {
            const char = data.data;
            document.getElementById('selected-char-name').textContent = `👤 ${char.name} - 动作详情`;
            document.getElementById('skill-count').textContent = `${char.skills ? char.skills.length : 0} 个动作`;
            
            const tbody = document.getElementById('skills-tbody');
            
            if (char.skills && char.skills.length > 0) {
                tbody.innerHTML = char.skills.map(skill => {
                    const skillTypeClass = skill.skill_type ? 
                        (skill.skill_type.includes('技能') ? 'tag-e' : 
                         skill.skill_type.includes('解放') ? 'tag-q' : 
                         skill.skill_type.includes('普攻') ? 'tag-a' : 'tag-h') : 'tag-e';
                    
                    const elementClass = skill.element ? `element-${skill.element}` : '';
                    
                    return `
                        <tr>
                            <td class="col-skill-code"><strong>${skill.skill_code}</strong></td>
                            <td class="col-element ${elementClass}">${skill.element || '-'}</td>
                            <td class="col-settlement">${skill.settlement_type || '-'}</td>
                            <td class="col-skill-type"><span class="tag ${skillTypeClass}">${skill.skill_type || '-'}</span></td>
                            <td class="col-damage-type">${skill.damage_type || '-'}</td>
                            <td class="col-damage-subtype">${skill.damage_subtype || '-'}</td>
                            <td class="col-heal">${skill.base_heal || '-'}</td>
                            <td class="col-multiplier-base">${skill.multiplier_base || '-'}</td>
                            <td class="col-multiplier">${skill.multiplier ? (skill.multiplier * 100).toFixed(2) + '%' : '-'}</td>
                            <td class="col-energy">${skill.ult_energy_cost || '-'}</td>
                            <td class="col-res-energy1">${skill.resonance_energy1 || '-'}</td>
                            <td class="col-res-energy2">${skill.resonance_energy2 || '-'}</td>
                        </tr>
                    `;
                }).join('');
            } else {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="12" style="padding: 40px; color: var(--text-secondary);">
                            暂无动作数据
                        </td>
                    </tr>
                `;
            }
            
            document.getElementById('skills-panel').style.display = 'block';
            
            // 滚动到技能面板
            document.getElementById('skills-panel').scrollIntoView({ behavior: 'smooth' });
        }
    } catch (e) {
        console.error('加载角色详情失败:', e);
    }
}
</script>
{% endblock %}
