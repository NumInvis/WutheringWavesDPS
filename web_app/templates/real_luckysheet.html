<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鸣潮排轴DPS计算器 - 满血Excel版</title>
    
    <!-- Luckysheet CSS -->
    <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/luckysheet/dist/plugins/css/pluginsCss.css' />
    <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/luckysheet/dist/plugins/plugins.css' />
    <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/luckysheet/dist/css/luckysheet.css' />
    <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/luckysheet/dist/assets/iconfont/iconfont.css' />
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1e1e1e; overflow: hidden; height: 100vh; }
        .app-container { display: flex; flex-direction: column; height: 100vh; }
        
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #0f3460;
            flex-shrink: 0;
        }
        .header h1 { font-size: 18px; font-weight: 600; color: #00d4ff; }
        .header-actions { display: flex; gap: 10px; }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s;
        }
        .btn-primary { background: linear-gradient(135deg, #00d4ff, #0099cc); color: #000; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0,212,255,0.4); }
        .btn-secondary { background: #2a2a3e; color: #e0e0e0; border: 1px solid #3a3a4e; }
        .btn-secondary:hover { background: #3a3a4e; }
        
        .main-content { flex: 1; overflow: hidden; }
        #luckysheet-container { width: 100%; height: 100%; }
        
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .loading-content { text-align: center; color: #fff; }
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        #fileInput { display: none; }
        
        .template-options {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        .template-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s;
        }
        .template-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(102,126,234,0.4); }
        
        .status-bar {
            background: #2a2a3e;
            padding: 5px 20px;
            color: #888;
            font-size: 12px;
            border-top: 1px solid #3a3a4e;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <div class="header">
            <div>
                <h1>⚡ 鸣潮排轴DPS计算器 - 满血Excel版</h1>
                <div style="margin-top: 8px; color: #888; font-size: 12px;">
                    点击"导入Excel"按钮上传你的拉表文件
                </div>
            </div>
            <div class="header-actions">
                <button class="btn btn-secondary" onclick="importExcel()">📥 导入Excel</button>
                <button class="btn btn-secondary" onclick="exportExcel()">📤 导出Excel</button>
                <button class="btn btn-secondary" onclick="saveData()">💾 保存</button>
                <button class="btn btn-secondary" onclick="loadData()">📂 加载</button>
                <button class="btn btn-primary" onclick="calculateAll()">🔄 重新计算</button>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="main-content">
            <div id="luckysheet-container"></div>
        </div>
        
        <div class="status-bar" id="status-bar">
            就绪 - 点击导入Excel按钮上传文件
        </div>
    </div>
    
    <input type="file" id="fileInput" accept=".xlsx,.xls" onchange="handleFile(event)">
    
    <div class="loading-overlay" id="loading">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <p id="loading-text">正在加载...</p>
        </div>
    </div>

    <!-- Luckysheet and LuckyExcel -->
    <script src="https://cdn.jsdelivr.net/npm/luckysheet/dist/plugins/js/plugin.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/luckysheet/dist/luckysheet.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/luckyexcel@1.0.1/dist/luckyexcel.umd.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <script>
        let luckysheetInstance = null;
        let originalSheetData = null;
        
        // 更新状态栏
        function updateStatus(text) {
            document.getElementById('status-bar').textContent = text;
        }
        
        // 公式转换引擎 - 处理百分比等特殊格式
        function convertFormula(formula) {
            if (!formula || typeof formula !== 'string') {
                return formula;
            }
            
            let converted = formula;
            
            // 转换百分比格式: 8.6% -> 0.086
            // 匹配数字+%的模式，比如 8.6%, 10%, 123.45%
            converted = converted.replace(/(\d+\.?\d*)%/g, function(match, num) {
                return '(' + parseFloat(num) / 100 + ')';
            });
            
            // 转换带括号的百分比: (8.6%) -> (0.086)
            converted = converted.replace(/\((\d+\.?\d*)%\)/g, function(match, num) {
                return '(' + parseFloat(num) / 100 + ')';
            });
            
            return converted;
        }
        
        // 深度处理工作表数据 - 转换所有公式
        function processSheetData(sheets) {
            console.log('开始处理工作表数据，转换公式...');
            
            sheets.forEach((sheet, sheetIndex) => {
                if (sheet.celldata && Array.isArray(sheet.celldata)) {
                    let formulaCount = 0;
                    
                    sheet.celldata.forEach((cell) => {
                        if (cell.v) {
                            // 处理公式
                            if (cell.v.f) {
                                const originalFormula = cell.v.f;
                                const convertedFormula = convertFormula(originalFormula);
                                
                                if (originalFormula !== convertedFormula) {
                                    console.log(`工作表${sheetIndex + 1}[${sheet.name}] 转换公式: ${originalFormula} -> ${convertedFormula}`);
                                    cell.v.f = convertedFormula;
                                    formulaCount++;
                                }
                            }
                            
                            // 处理单元格值 - 如果是百分比格式的数值
                            if (cell.v.ct && cell.v.ct.fa && cell.v.ct.fa.includes('%')) {
                                // 保持原样，但确保数值正确
                            }
                        }
                    });
                    
                    if (formulaCount > 0) {
                        console.log(`工作表${sheetIndex + 1}[${sheet.name}] 共转换 ${formulaCount} 个公式`);
                    }
                }
            });
            
            return sheets;
        }
        
        // 初始化 - 显示空白表格
        function initEmptySheet() {
            luckysheet.create({
                container: 'luckysheet-container',
                title: '鸣潮DPS计算器',
                lang: 'zh',
                showinfobar: true,
                showsheetbar: true,
                showstatisticBar: true,
                enableAddRow: true,
                enableAddCol: true,
                data: [{
                    name: 'Sheet1',
                    color: '#00d4ff',
                    status: 1,
                    order: 0,
                    celldata: [],
                    row: 100,
                    column: 50,
                    defaultRowHeight: 20,
                    defaultColWidth: 80,
                    config: {
                        merge: {},
                        rowlen: {},
                        columnlen: {},
                        rowhidden: {},
                        colhidden: {}
                    }
                }],
                forceCalculation: true,
                allowUpdate: true,
                functionButton: true
            });
            updateStatus('就绪 - 点击导入Excel按钮上传文件');
        }
        

        
        // 使用LuckyExcel加载Excel文件
        function loadExcelFile(file) {
            LuckyExcel.transformExcelToLucky(file, function(exportJson, luckysheetfile) {
                if (exportJson.sheets == null || exportJson.sheets.length == 0) {
                    alert('读取Excel文件失败，文件内容为空！');
                    hideLoading();
                    updateStatus('读取失败 - 文件为空');
                    return;
                }
                
                console.log('成功解析Excel，工作表数量:', exportJson.sheets.length);
                
                // 保存原始数据
                originalSheetData = JSON.parse(JSON.stringify(exportJson.sheets));
                
                // 处理数据 - 转换公式
                const processedSheets = processSheetData(exportJson.sheets);
                
                if (luckysheetInstance) {
                    luckysheet.destroy();
                }
                
                luckysheet.create({
                    container: 'luckysheet-container',
                    title: file.name,
                    lang: 'zh',
                    showinfobar: true,
                    showsheetbar: true,
                    showstatisticBar: true,
                    enableAddRow: true,
                    enableAddCol: true,
                    data: processedSheets,
                    forceCalculation: true,
                    allowUpdate: true,
                    functionButton: true,
                    autoFormatw: true,
                    allowCopy: true
                });
                
                luckysheetInstance = true;
                hideLoading();
                updateStatus(`已加载 ${file.name} - 共 ${processedSheets.length} 个工作表`);
                
                setTimeout(() => {
                    luckysheet.refresh();
                    alert(`已成功加载 ${file.name}！\n共 ${processedSheets.length} 个工作表。\n\n百分比公式已自动转换为可计算格式。`);
                }, 800);
            });
        }
        
        // 导入Excel
        function importExcel() {
            document.getElementById('fileInput').click();
        }
        
        function handleFile(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            showLoading('正在解析Excel文件...');
            updateStatus('正在解析 ' + file.name + '...');
            loadExcelFile(file);
            event.target.value = '';
        }
        
        // 导出Excel
        function exportExcel() {
            try {
                showLoading('正在导出Excel...');
                updateStatus('正在导出...');
                
                const sheetData = luckysheet.getSheetData();
                const wb = XLSX.utils.book_new();
                
                sheetData.forEach((sheet, index) => {
                    console.log(`正在处理工作表 ${index + 1}: ${sheet.name}`);
                    
                    const wsData = [];
                    const maxRow = sheet.row || 100;
                    const maxCol = sheet.column || 50;
                    
                    for (let r = 0; r < maxRow; r++) {
                        const row = [];
                        for (let c = 0; c < maxCol; c++) {
                            const cell = sheet.celldata ? sheet.celldata.find(cd => cd.r === r && cd.c === c) : null;
                            if (cell && cell.v) {
                                if (cell.v.f) {
                                    row.push({ f: cell.v.f });
                                } else if (cell.v.v !== undefined) {
                                    row.push(cell.v.v);
                                } else if (cell.v.m !== undefined) {
                                    row.push(cell.v.m);
                                } else {
                                    row.push('');
                                }
                            } else {
                                row.push('');
                            }
                        }
                        wsData.push(row);
                    }
                    
                    const ws = XLSX.utils.aoa_to_sheet(wsData);
                    XLSX.utils.book_append_sheet(wb, ws, sheet.name || `Sheet${index + 1}`);
                });
                
                hideLoading();
                updateStatus('导出成功！');
                XLSX.writeFile(wb, '鸣潮DPS计算_导出.xlsx');
                alert('导出成功！');
                
            } catch (error) {
                hideLoading();
                console.error('导出失败:', error);
                updateStatus('导出失败: ' + error.message);
                alert('导出失败: ' + error.message);
            }
        }
        
        // 保存数据
        function saveData() {
            try {
                const sheetData = luckysheet.getSheetData();
                localStorage.setItem('wuwaRealSheetData', JSON.stringify({
                    sheetData: sheetData,
                    timestamp: new Date().toISOString()
                }));
                updateStatus('数据已保存');
                alert('数据已保存到本地！');
            } catch (error) {
                updateStatus('保存失败: ' + error.message);
                alert('保存失败: ' + error.message);
            }
        }
        
        // 加载数据
        function loadData() {
            try {
                const saved = localStorage.getItem('wuwaRealSheetData');
                if (saved) {
                    const data = JSON.parse(saved);
                    if (luckysheetInstance) {
                        luckysheet.destroy();
                    }
                    
                    // 处理加载的数据
                    const processedSheets = processSheetData(data.sheetData);
                    
                    luckysheet.create({
                        container: 'luckysheet-container',
                        title: '鸣潮DPS计算器',
                        lang: 'zh',
                        showinfobar: true,
                        showsheetbar: true,
                        showstatisticBar: true,
                        enableAddRow: true,
                        enableAddCol: true,
                        data: processedSheets,
                        forceCalculation: true,
                        allowUpdate: true
                    });
                    luckysheetInstance = true;
                    updateStatus('数据加载成功');
                    alert('数据加载成功！');
                } else {
                    alert('没有找到保存的数据！');
                }
            } catch (error) {
                updateStatus('加载失败: ' + error.message);
                alert('加载失败: ' + error.message);
            }
        }
        
        // 重新计算
        function calculateAll() {
            showLoading('正在重新计算...');
            updateStatus('正在重新计算...');
            luckysheet.refresh();
            setTimeout(() => {
                hideLoading();
                updateStatus('计算完成');
                alert('计算完成！');
            }, 500);
        }
        
        function showLoading(text) {
            document.getElementById('loading-text').textContent = text || '正在加载...';
            document.getElementById('loading').style.display = 'flex';
        }
        
        function hideLoading() {
            document.getElementById('loading').style.display = 'none';
        }
        
        // 页面加载完成后初始化
        window.onload = function() {
            setTimeout(() => {
                initEmptySheet();
            }, 100);
        };
    </script>
</body>
</html>
